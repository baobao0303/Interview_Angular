<h2>Angular Reactive Form</h2>

<form [formGroup]="usernameForm" (ngSubmit)="onSubmit()" style="display: flex; flex-direction: column; max-width: 300px; gap: 10px;">
  <label for="username">Username:</label>
  <input 
    type="text" 
    id="username"
    formControlName="username" 
    placeholder="Enter username"
    style="padding: 8px;"
  >
  
  <p *ngIf="username?.invalid && username?.touched" style="color: red; margin: 0;">
    Username must be at least 3 characters
  </p>

  <p *ngIf="usernameForm.invalid && usernameForm.touched" style="color: blue; margin: 0;">
    Form is invalid
  </p>

  <button type="submit" [disabled]="usernameForm.invalid" style="padding: 8px; background: #28a745; color: white; border: none; border-radius: 4px;">Submit</button>
</form>
