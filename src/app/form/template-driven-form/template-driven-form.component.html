<h2>Angular Template Form</h2>

<form #f="ngForm" (ngSubmit)="onSubmit(f.value)" style="display: flex; flex-direction: column; max-width: 300px; gap: 10px;">
  
  <label for="username">Username:</label>
  <input
    type="text"
    id="username"
    name="username"
    ngModel
    minlength="3"
    #username="ngModel"
    placeholder="Enter username"
    style="padding: 8px;"
  >
  
  <p *ngIf="username.invalid && username.touched" style="color: red; margin: 0;">
    Username must be at least 3 characters
  </p>

  <p *ngIf="f.invalid && f.touched" style="color: blue; margin: 0;">
    Form is invalid
  </p>

  <button type="submit" [disabled]="f.invalid" style="padding: 8px; background: #007bff; color: white; border: none; border-radius: 4px;">Submit</button>

</form>
